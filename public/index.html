<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GPZ-40 | Obsidian Flux</title>

    <link rel="stylesheet" href="./style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= Sidebar ================= -->
    <aside class="sidebar">

        <!-- New Chat -->
        <div class="new-chat-container">
            <button class="new-chat-btn" id="new-chat-btn">
                <span class="btn-left">
                    <span class="material-symbols-outlined" data-icon="add">
                        add
                    </span>

                    <span style="font-size:13px; font-family:'JetBrains Mono', monospace;">
                        New Chat
                    </span>
                </span>

                <span class="material-symbols-outlined"
                    data-icon="edit_square"
                    style="font-size:14px; opacity:0.5;">
                    edit_square
                </span>
            </button>
        </div>

        <!-- Chat History -->
        <nav class="chat-history-nav custom-scrollbar">

            <!-- Today -->
            <div class="history-section">

                <h3 class="section-title">Today</h3>

                <div>

                    <a class="history-item active" href="#">
                        <span class="item-text">Project Planning</span>
                    </a>

                    <a class="history-item" href="#">
                        <span class="item-text">Travel Ideas</span>
                        <span class="material-symbols-outlined more-icon"
                            data-icon="more_horiz">
                            more_horiz
                        </span>
                    </a>

                    <a class="history-item" href="#">
                        <span class="item-text">Code Debugging</span>
                        <span class="material-symbols-outlined more-icon"
                            data-icon="more_horiz">
                            more_horiz
                        </span>
                    </a>

                </div>

            </div>

            <!-- Previous 7 Days -->
            <div class="history-section">

                <h3 class="section-title">
                    Previous 7 Days
                </h3>

                <div>

                    <a class="history-item" href="#">
                        <span class="item-text">
                            Refined Dark Minimalism Design
                        </span>

                        <span class="material-symbols-outlined more-icon"
                            data-icon="more_horiz">
                            more_horiz
                        </span>
                    </a>

                    <a class="history-item" href="#">
                        <span class="item-text">
                            UI Component Library Strategy
                        </span>

                        <span class="material-symbols-outlined more-icon"
                            data-icon="more_horiz">
                            more_horiz
                        </span>
                    </a>

                </div>

            </div>

        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">

            <button class="footer-btn">
                <span class="material-symbols-outlined" data-icon="settings">
                    settings
                </span>
                <span>Settings</span>
            </button>

            <button class="profile-btn">

                <div class="avatar">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgIidopJFTm422zCdHVkVyxvoJq3PkgEWzPaLbiJ5PEuxO6Wv3k9Vqf7M1G4umOef8rNR0N1CeIzT8ztaesZIDNul7Yj6wMapuFP5pgJGEyhTOKVBjEAowGhUriT5VkEZze-g5jB1RzsHDP8MVGPwQUzxiNdbke82G1t7meYGIuznvuMOaq3DtF2pzVhujaw6Cm-unyAYaq0nVcxy3_Em2IL6tkwXAdL09C4pspxFB0LmbU8ZTm0jF59O_OosBu9D67f3eF1T9f_h6"
                        alt="User Profile">
                </div>

                <div class="profile-info">
                    <p class="profile-name">User Profile</p>
                    <p class="profile-plan">Pro Plan</p>
                </div>

                <span class="material-symbols-outlined"
                    data-icon="unfold_more"
                    style="color:var(--on-surface-variant);">
                    unfold_more
                </span>

            </button>

        </div>

    </aside>

    <!-- ================= Main Content ================= -->
    <main class="main-content">

        <!-- Header -->
        <header>

            <div class="header-left">

                <button class="menu-btn">
                    <span class="material-symbols-outlined" data-icon="menu">
                        menu
                    </span>
                </button>

                <div class="model-selector">
                    <span class="model-name">GPZ-4.0</span>

                    <span class="material-symbols-outlined"
                        data-icon="keyboard_arrow_down"
                        style="color:var(--on-surface-variant); font-size:14px;">
                        keyboard_arrow_down
                    </span>
                </div>

            </div>

            <div class="header-right">

                <button class="icon-btn" title="Share">
                    <span class="material-symbols-outlined" data-icon="share">
                        share
                    </span>
                </button>

                <button class="icon-btn">
                    <span class="material-symbols-outlined"
                        data-icon="more_vert">
                        more_vert
                    </span>
                </button>

            </div>

        </header>

        <!-- Chat Container -->
        <section class="chat-container custom-scrollbar" id="chat-container">

            <!-- Landing -->
            <div class="landing-view" id="landing-view">

                <div class="landing-hero">

                    <div class="logo-box">
                        <span class="material-symbols-outlined"
                            data-icon="token"
                            style="font-variation-settings:'FILL' 1;">
                            token
                        </span>
                    </div>

                    <h1 class="landing-title">
                        How can I help you today?
                    </h1>

                </div>

                <!-- Suggestions -->
                <div class="suggestion-grid">

                    <button class="suggestion-card">
                        <div>
                            <span class="material-symbols-outlined"
                                data-icon="edit_note"
                                style="color:var(--primary); margin-bottom:.5rem;">
                                edit_note
                            </span>

                            <h3>Help me write...</h3>
                            <p>a short story about a time traveler</p>
                        </div>

                        <span class="material-symbols-outlined arrow-icon"
                            data-icon="arrow_forward">
                            arrow_forward
                        </span>
                    </button>

                    <button class="suggestion-card">
                        <div>
                            <span class="material-symbols-outlined"
                                data-icon="summarize"
                                style="color:var(--primary); margin-bottom:.5rem;">
                                summarize
                            </span>

                            <h3>Summarize this...</h3>
                            <p>article on the latest space exploration</p>
                        </div>

                        <span class="material-symbols-outlined arrow-icon"
                            data-icon="arrow_forward">
                            arrow_forward
                        </span>
                    </button>

                    <button class="suggestion-card">
                        <div>
                            <span class="material-symbols-outlined"
                                data-icon="flight_takeoff"
                                style="color:var(--primary); margin-bottom:.5rem;">
                                flight_takeoff
                            </span>

                            <h3>Plan a trip</h3>
                            <p>to Tokyo for a food-focused week</p>
                        </div>

                        <span class="material-symbols-outlined arrow-icon"
                            data-icon="arrow_forward">
                            arrow_forward
                        </span>
                    </button>

                    <button class="suggestion-card">
                        <div>
                            <span class="material-symbols-outlined"
                                data-icon="terminal"
                                style="color:var(--primary); margin-bottom:.5rem;">
                                terminal
                            </span>

                            <h3>Explain code</h3>
                            <p>how to implement a bento grid layout</p>
                        </div>

                        <span class="material-symbols-outlined arrow-icon"
                            data-icon="arrow_forward">
                            arrow_forward
                        </span>
                    </button>

                </div>

            </div>

            <!-- Messages -->
            <div class="messages-list hidden" id="messages-list">
                <!-- Messages populated by JS -->
            </div>

        </section>

        <!-- Footer -->
        <footer class="input-footer">

            <div class="input-wrapper">

                <div class="input-container">

                    <button class="attach-btn" title="Attach file">
                        <span class="material-symbols-outlined"
                            data-icon="attach_file">
                            attach_file
                        </span>
                    </button>

                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Message GPZ-4.0"></textarea>

                    <button class="send-btn"
                        id="send-btn"
                        title="Send message">

                        <span class="material-symbols-outlined"
                            data-icon="arrow_upward"
                            style="font-weight:700; font-variation-settings:'wght' 700;">
                            arrow_upward
                        </span>

                    </button>

                </div>

                <p class="footer-note">
                    ChatGPZ can make mistakes. Check important info.
                </p>

            </div>

        </footer>

        <!-- Background -->
        <div class="background-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

    </main>

    <script src="./script.js"></script>

</body>

</html>
